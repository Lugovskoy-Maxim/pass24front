# HTTPS — подключается scripts/setup-ssl.sh после выпуска сертификата
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pass.mstyle.ru 188.64.164.202;

    ssl_certificate /etc/letsencrypt/live/pass.mstyle.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pass.mstyle.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:Pass24SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP → HTTPS (после выпуска сертификата)
server {
    listen 80;
    listen [::]:80;
    server_name pass.mstyle.ru 188.64.164.202;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://pass.mstyle.ru$request_uri;
    }
}