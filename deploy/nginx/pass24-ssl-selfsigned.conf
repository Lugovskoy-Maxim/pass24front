# HTTPS (self-signed) — пока DNS/NAT не настроены для Let's Encrypt
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pass.mstyle.ru 188.64.164.202 192.168.200.9;

    ssl_certificate /etc/ssl/certs/pass.mstyle.ru.crt;
    ssl_certificate_key /etc/ssl/private/pass.mstyle.ru.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}