# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d --build

services:
  mongo:
    # Серверы без AVX (старые Xeon/VM) — MongoDB 5+ падает с Illegal instruction
    image: mongo:4.4
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s


  mailpit:
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  backend:
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - PUBLIC_APP_URL=${PUBLIC_APP_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - NODE_ENV=production
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@pass24.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_FULL_NAME=${ADMIN_FULL_NAME:-Супер-администратор}
      - ADMIN_ROLE=${ADMIN_ROLE:-admin}
      - SEED_DEV_DATA=${SEED_DEV_DATA:-false}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_FROM=${SMTP_FROM:-Пропуск.М-Стиль <pass@mstyle.ru>}

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}